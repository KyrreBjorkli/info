<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Postcode lookup service</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <h1>Welcome to our postcode lookup service</h1>

    <h2>Lookup</h2>
    <form action="/lookup" method="get">
      <label for="pclookup">Postcode</label>
      <input type="text" name="postcode" id="pclookup" />
      <button type="submit">Submit</button>
    </form>

    <h2>Add postcode</h2>
    <form action="/postcode" method="post">
      <div>
        <label for="pc">Postcode</label>
        <input type="text" name="postcode" id="pc" />
      </div>
      <div>
        <label for="city">City</label>
        <input type="text" name="city" id="city" />
      </div>

      <button type="submit">Submit</button>
    </form>

    <!-- You can lookup a postcode by using <a href="/postcode/4021">/postcode/&lt;????&gt;</a> -->
  </body>
</html>
